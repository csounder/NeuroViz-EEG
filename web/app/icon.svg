<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="NeuroVis brain">
  <defs>
    <linearGradient id="skull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="45%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <radialGradient id="highlight" cx="32%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#ecfdf5" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#a7f3d0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="70%" cy="85%" r="45%">
      <stop offset="0%" stop-color="#064e3b" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#064e3b" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.6" result="b"/>
      <feOffset dx="0" dy="0.8" in="b" result="o"/>
      <feMerge>
        <feMergeNode in="o"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Base + depth -->
  <ellipse cx="16" cy="17.5" rx="13" ry="12" fill="url(#skull)" filter="url(#soft)"/>
  <ellipse cx="16" cy="17.5" rx="13" ry="12" fill="url(#shadow)"/>
  <ellipse cx="16" cy="17.5" rx="13" ry="12" fill="url(#highlight)"/>
  <!-- Midline -->
  <path d="M16 6.5 Q16 16 16 25.5" fill="none" stroke="#047857" stroke-width="0.85" stroke-linecap="round" opacity="0.55"/>
  <!-- Sulci / folds (left) -->
  <path d="M9 11 Q11 13 10 17 Q9 20 10.5 23" fill="none" stroke="#047857" stroke-width="0.65" stroke-linecap="round" opacity="0.4"/>
  <path d="M11 9 Q12.5 14 11.5 19" fill="none" stroke="#047857" stroke-width="0.55" stroke-linecap="round" opacity="0.35"/>
  <path d="M7.5 15 Q9.5 16 8.5 21" fill="none" stroke="#047857" stroke-width="0.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Sulci / folds (right) -->
  <path d="M23 11 Q21 13 22 17 Q23 20 21.5 23" fill="none" stroke="#047857" stroke-width="0.65" stroke-linecap="round" opacity="0.4"/>
  <path d="M21 9 Q19.5 14 20.5 19" fill="none" stroke="#047857" stroke-width="0.55" stroke-linecap="round" opacity="0.35"/>
  <path d="M24.5 15 Q22.5 16 23.5 21" fill="none" stroke="#047857" stroke-width="0.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Subtle rim light -->
  <ellipse cx="16" cy="16" rx="12" ry="11" fill="none" stroke="#6ee7b7" stroke-width="0.4" opacity="0.35"/>
</svg>
